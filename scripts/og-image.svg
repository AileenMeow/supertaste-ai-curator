<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="22%" stop-color="#FF8E53"/>
      <stop offset="48%" stop-color="#FFB347"/>
      <stop offset="75%" stop-color="#FFE66D"/>
      <stop offset="100%" stop-color="#FFF8E7"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#FFF8E7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative SVGs (subtle, like home hero) -->
  <!-- Boba (left) -->
  <g transform="translate(60,330) rotate(-6)" opacity="0.18" fill="none" stroke="#FFF8F0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 42 Q48 60 52 105 Q56 160 70 178 Q88 184 110 178 Q126 160 130 105 Q132 60 128 42 Z"/>
    <ellipse cx="90" cy="40" rx="42" ry="9"/>
    <path d="M86 18 Q84 60 86 100" stroke-width="4"/>
    <circle cx="68" cy="148" r="5" fill="rgba(255,255,255,0.5)" stroke="none"/>
    <circle cx="84" cy="156" r="5" fill="rgba(255,255,255,0.5)" stroke="none"/>
    <circle cx="100" cy="150" r="5" fill="rgba(255,255,255,0.5)" stroke="none"/>
  </g>

  <!-- Lantern (right) -->
  <g transform="translate(1000,180) rotate(6)" opacity="0.18" fill="none" stroke="#FFF8F0" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 80 L30 40 Q30 18 50 12 Q70 18 70 40 L70 80 Q70 92 50 96 Q30 92 30 80 Z"/>
    <path d="M22 80 L78 80"/>
    <path d="M26 40 L74 40"/>
    <path d="M50 12 L50 4"/>
  </g>

  <!-- Train (right top) -->
  <g transform="translate(960,420) rotate(-8)" opacity="0.18" fill="none" stroke="#FFF8F0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 20 Q4 14 12 12 L120 12 Q140 14 144 36 L144 64 Q144 72 134 72 L18 72 Q8 72 8 62 Z"/>
    <rect x="20" y="24" width="22" height="22" rx="2"/>
    <rect x="50" y="24" width="22" height="22" rx="2"/>
    <rect x="80" y="24" width="22" height="22" rx="2"/>
    <circle cx="34" cy="80" r="9"/>
    <circle cx="68" cy="80" r="9"/>
    <circle cx="104" cy="80" r="9"/>
  </g>

  <!-- Heart sparkles -->
  <g opacity="0.5">
    <circle cx="280" cy="120" r="6" fill="#FFD23F"/>
    <circle cx="900" cy="100" r="5" fill="#FFFFFF"/>
    <circle cx="180" cy="200" r="4" fill="#FFF"/>
    <circle cx="1080" cy="320" r="6" fill="#FFD23F"/>
    <circle cx="850" cy="500" r="4" fill="#FFF"/>
  </g>

  <!-- Top badge -->
  <g transform="translate(600,130)">
    <rect x="-200" y="-26" width="400" height="52" rx="26" fill="rgba(255,255,255,0.9)"/>
    <circle cx="-160" cy="0" r="5" fill="#FF7847"/>
    <text x="-140" y="6" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="20" font-weight="700" fill="#E04400">
      食尚玩家 500 位達人 × Claude AI 策展
    </text>
  </g>

  <!-- Main title -->
  <text x="600" y="285" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="92" font-weight="900" fill="url(#title)" text-anchor="middle" letter-spacing="2" filter="drop-shadow(2px 4px 12px rgba(180,60,0,0.4))">
    台灣新玩法
  </text>
  <text x="600" y="395" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="74" font-weight="900" fill="#FFF8E7" text-anchor="middle" letter-spacing="2" filter="drop-shadow(2px 4px 12px rgba(180,60,0,0.4))">
    開啟一場有溫度的旅行
  </text>

  <!-- Sub line -->
  <text x="600" y="465" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.92)" text-anchor="middle">
    台北・台南・花蓮 × 各 10 種玩法 × AI 智慧排程
  </text>

  <!-- Bottom brand -->
  <g transform="translate(600,560)">
    <rect x="-130" y="-26" width="260" height="52" rx="26" fill="white" filter="drop-shadow(0 4px 12px rgba(0,0,0,0.15))"/>
    <text x="0" y="8" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="22" font-weight="900" fill="#E04400" text-anchor="middle">
      食尚玩家 AI 導遊
    </text>
  </g>

  <!-- Bottom wave -->
  <path d="M0,605 Q200,580 400,600 T800,600 T1200,605 L1200,630 L0,630 Z" fill="white" opacity="0.95"/>
</svg>
