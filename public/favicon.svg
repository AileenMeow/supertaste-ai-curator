<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Hand-drawn tour guide flag -->
  <!-- Pole: slightly wavy for hand-drawn feel -->
  <path d="M7 3 Q6.2 10 6.5 18 Q6.8 24 7 30" stroke="#FF7847" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- Flag: organic pentagon shape -->
  <path d="M7 4 Q13.5 1.5 21 4.2 Q27.5 2.2 28.8 6 Q22 9.5 16 8 Q10 11.5 7 13.5 Z" fill="#FF7847"/>
  <!-- Flag highlight -->
  <path d="M9.5 5.2 Q16 3.5 23 6" stroke="rgba(255,255,255,0.5)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Sparkle dots on flag -->
  <circle cx="20" cy="6.2" r="1.1" fill="white" opacity="0.75"/>
  <circle cx="13.5" cy="8" r="0.7" fill="white" opacity="0.5"/>
  <!-- Pole end cap -->
  <circle cx="7" cy="29.5" r="1.3" fill="#FF7847"/>
</svg>
